services:
  # Web Service (Backend API + Frontend + Bot)
  - type: web
    name: rustam-barber
    env: python
    region: frankfurt  # Europe region
    plan: free
    branch: main
    buildCommand: pip install -r backend/requirements.txt
    startCommand: bash start-all.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: SUPER_ADMIN_CHAT_ID
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./bookings.db
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: WEB_APP_URL
        sync: false  # Will be set after deployment
      - key: GOOGLE_SHEET_ID
        sync: false
